# 로컬 H2 DB 설정
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1 # 메모리 모드로 실행
    driver-class-name: org.h2.Driver
    username: {유저네임}
    password: {비밀번호}

  jpa:
    hibernate:
      ddl-auto: create # 서버 켤 때마다 테이블 새로 생성
    show-sql: true # 실행되는 쿼리를 로그로 출력
    properties:
      hibernate:
        format_sql: true # 쿼리를 예쁘게 정렬해서 보여줌

# 로깅 설정: 과제 요구사항 "[API - LOG] xx"를 위해 로그 레벨 지정
logging:
  level:
    kr.spartaclub.startupteamservice: INFO # INFO 레벨로 설정