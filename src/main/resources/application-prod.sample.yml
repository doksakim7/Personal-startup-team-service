spring:
  config:
    import: "aws-parameterstore:/startup-team-service/prod/"

  jpa:
    hibernate:
      ddl-auto: validate # 운영은 DB 구조가 맞는지 체크만 함
    show-sql: false

# 운영 환경 전용 모니터링 및 로깅 설정
management:
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    message: "${APP_MESSAGE}"
    team-name: "${team-name}"

logging:
  level:
    root: INFO
    kr.spartaclub.startupteamservice: INFO