spring:
  datasource:
    url: jdbc:mysql://{RDS엔드포인트}:3306/{데이터베이스명}
    username: {유저네임}
    password: {비밀번호}
  jpa:
    hibernate:
      ddl-auto: validate # 운영 환경에서는 데이터 보존을 위해 validate 권장


